<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Peddana&family=Pixelify+Sans&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  overflow: hidden;
}

body {
  height: 100%;
  overflow: hidden;
  background-color: #87ceeb;
  background-image:
    radial-gradient(ellipse 60% 40% at 70% 30%, rgba(255,255,255,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 60%, rgba(255,255,255,0.3) 0%, transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  font-family: 'Peddana', serif;
}

/* ── WRAPPER ── */
#app {
  position: relative;
  width: 736px;
  flex-shrink: 0;
}

/* ── SPIRAL BINDING ── */
#spiral-binding {
  position: absolute;
  top: -14px;
  left: 0;
  width: 736px;
  height: 56px;
  z-index: 30;
  pointer-events: none;
}

/* ── CALENDAR CARD ── */
#calendar-card {
  position: relative;
  width: 736px;
  height: 759px; /* updated by JS each month */
  background: #fffcf7;
  border: 1px solid #e7ddcb;
  border-radius: 8px;
  box-shadow: 3px 4px 9.8px rgba(90,85,75,0.57);
  overflow: hidden;
}

/* ── PIXEL FLOWER ── */
#pixel-flower-svg {
  position: absolute;
  top: 48px;
  left: 34px;
  overflow: visible;
  pointer-events: none;
}

/* ── MONTH / NAV ── */
#month-nav {
  position: absolute;
  top: 43px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-arrow {
  font-family: 'Peddana', serif;
  font-size: 28px;
  color: #baac94;
  background: none;
  border: none;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
  transition: color 0.15s;
  user-select: none;
}
.nav-arrow:hover { color: #5c5241; }

#month-heading {
  font-family: 'Peddana', serif;
  font-size: 51px;
  font-weight: 400;
  color: #5c5241;
  letter-spacing: -1.02px;
  line-height: 1;
  white-space: nowrap;
}

/* ── DAY HEADERS ── */
#day-headers {
  position: absolute;
  top: 127px;
  left: 0;
  width: 736px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-left: 1px solid #e7ddcb;
}

.day-header {
  font-family: 'Peddana', serif;
  font-size: 16px;
  color: #baac94;
  text-align: center;
  padding: 0 0 6px;
  border-right: 1px solid #e7ddcb;
}

/* ── CALENDAR GRID ── */
#calendar-grid {
  position: absolute;
  top: 149px;
  left: 0;
  width: 736px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-top: 1px solid #e7ddcb;
  border-left: 1px solid #e7ddcb;
}

.cal-cell {
  height: 120px;
  border-right: 1px solid #e7ddcb;
  border-bottom: 1px solid #e7ddcb;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.cal-cell.empty-pad {
  cursor: default;
  background: #fffcf7;
}

.cal-cell.future {
  opacity: 0.4;
  cursor: not-allowed;
}

.cal-cell.today {
  box-shadow: inset 0 0 0 2px #c8a87a;
  background: #fffdf0;
}

/* Day number */
.day-num {
  position: absolute;
  top: 4px;
  right: 6px;
  font-family: 'Pixelify Sans', monospace;
  font-size: 16px;
  color: #6b5e47;
  line-height: normal;
  z-index: 2;
}

.cal-cell.filled .day-num {
  color: #fff;
  font-size: 13px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* Sky unseen label */
.sky-unseen {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-family: 'Peddana', serif;
  font-size: 11px;
  color: #d4c9b4;
  pointer-events: none;
}

/* Photo fill */
.cell-photo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}

/* ── COLOR STRIP ── */
#color-strip {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 734px;
  height: 13px;
  overflow: visible;
}
#color-strip > div {
  position: absolute;
}

/* ── BACKDROP ── */
#backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease-out;
}
#backdrop.visible {
  opacity: 1;
  pointer-events: all;
}

/* ── BOTTOM SHEET ── */
#bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: min(480px, 100vw);
  background: #fffcf7;
  border-radius: 16px 16px 0 0;
  border: 1px solid #e7ddcb;
  box-shadow: 0 -4px 24px rgba(90,85,75,0.18);
  z-index: 200;
  padding: 0 0 40px;
  transition: transform 0.3s ease-out;
}
#bottom-sheet.open {
  transform: translateX(-50%) translateY(0);
}

.sheet-handle {
  width: 32px;
  height: 4px;
  background: #e7ddcb;
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-date {
  font-family: 'Peddana', serif;
  font-size: 24px;
  color: #5c5241;
  text-align: center;
  margin-top: 14px;
}

.sheet-body {
  padding: 16px 20px 0;
}

/* Empty day: tap zone */
.sheet-tap-zone {
  border: 1.5px dashed #e7ddcb;
  border-radius: 8px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: 'Peddana', serif;
  font-size: 14px;
  color: #baac94;
}
.sheet-tap-zone:active { opacity: 0.75; }

/* Filled day: photo preview */
.sheet-photo-preview {
  width: 100%;
  height: 180px;
  object-fit: cover;
  object-position: top center;
  border-radius: 8px;
  display: block;
}

.sheet-replace {
  font-family: 'Peddana', serif;
  font-size: 13px;
  color: #baac94;
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  background: none;
  border: none;
  display: block;
  width: 100%;
}
.sheet-replace:hover { color: #5c5241; }

#file-input {
  display: none;
}

/* ── MOBILE SCALE ── */
@media (max-width: 760px) {
  #app {
    width: 100vw;
    transform-origin: top center;
  }
  body { padding: 20px 0 40px; align-items: flex-start; }
}
</style>
</head>

      <div style="left:638px;top:0;width:97px;height:13px;background:#bed580"></div>
    </div>
  </div><!-- /calendar-card -->
</div><!-- /app -->

<!-- Bottom sheet -->
<div id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-date" id="sheet-date"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
// ─── Asset URLs from Figma (binding clips) ───────────────────────────────────
const FIGMA_LOOP_MASK  = 'https://www.figma.com/api/mcp/asset/dd59dce0-257d-41cf-8567-7c65b3073853';
const FIGMA_LOOP_FILL  = 'https://www.figma.com/api/mcp/asset/5dcc47e6-947f-4194-9855-7748434bef50';
const FIGMA_WIRE_MASK  = 'https://www.figma.com/api/mcp/asset/52da0196-da39-4ecc-bb7c-4eff9ed5e2ba';
const FIGMA_WIRE_L     = 'https://www.figma.com/api/mcp/asset/a511785e-f820-4071-ba29-18a9633bcb2d';
const FIGMA_WIRE_R     = 'https://www.figma.com/api/mcp/asset/e5fd9cc6-76a9-4f9e-aceb-ef3ac7213562';

// ─── Build spiral binding SVG ─────────────────────────────────────────────────
function buildSpiral() {
  const svg = document.getElementById('spiral-binding');
  // 21 clips spanning ~700px; each clip 26.735px wide, 33px step
  // SVG is 56px tall; card starts at y=14 in SVG coords
  // Wires run full SVG height (y=0 to 55) — above y=14 shows above card
  const count = 21;
  const startX = 8;
  const step   = 33;
  const loopW  = 26.735;
  const loopH  = 16.639;
  const ly     = 29.19; // loop top from clip top (= from SVG top)

  let markup = '';
  for (let i = 0; i < count; i++) {
    const cx = startX + i * step;
    // wires from very top to bottom of SVG
    markup += `<rect x="${(cx+5.83).toFixed(2)}" y="0" width="3.932" height="56" rx="1.8" fill="url(#wireGrad)"/>`;
    markup += `<rect x="${(cx+15.91).toFixed(2)}" y="0" width="3.932" height="56" rx="1.8" fill="url(#wireGrad)"/>`;
    // loop arc — open-bottom D-shape
    const r = loopW / 2;
    const lx = cx;
    markup += `<path d="M${(lx+1.5).toFixed(2)} ${(ly+loopH).toFixed(2)} L${(lx+1.5).toFixed(2)} ${(ly+r).toFixed(2)} A${(r-1.5).toFixed(2)} ${(r-1.5).toFixed(2)} 0 0 1 ${(lx+loopW-1.5).toFixed(2)} ${(ly+r).toFixed(2)} L${(lx+loopW-1.5).toFixed(2)} ${(ly+loopH).toFixed(2)}" stroke="url(#loopGrad)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#loopShadow)"/>`;
    // shine highlight
    markup += `<path d="M${(lx+4).toFixed(2)} ${(ly+loopH-1).toFixed(2)} L${(lx+4).toFixed(2)} ${(ly+r+3).toFixed(2)} A${(r-4).toFixed(2)} ${(r-4).toFixed(2)} 0 0 1 ${(lx+loopW-4).toFixed(2)} ${(ly+r+3).toFixed(2)} L${(lx+loopW-4).toFixed(2)} ${(ly+loopH-1).toFixed(2)}" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none"/>`;
  }
  svg.insertAdjacentHTML('beforeend', markup);
}

// ─── IndexedDB ───────────────────────────────────────────────────────────────
const DB_NAME    = 'SkyCalendar';
const DB_VERSION = 1;
const STORE      = 'photos';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function savePhoto(dateKey, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(blob, dateKey);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  });
}

async function getPhoto(dateKey) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(dateKey);
    req.onsuccess = e => resolve(e.target.result || null);
    req.onerror   = e => reject(e.target.error);
  });
}

async function getAllPhotosForMonth(year, month) {
  // Returns {dateKey: objectURL} map
  // All requests are issued synchronously within one transaction to prevent early commit
  const db     = await openDB();
  const prefix = `${year}-${String(month).padStart(2,'0')}-`;

  return new Promise((resolve, reject) => {
    const tx    = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const result = {};

    const keysReq = store.getAllKeys();
    keysReq.onerror = e => reject(e.target.error);
    keysReq.onsuccess = e => {
      const keys = e.target.result.filter(k => k.startsWith(prefix));
      if (keys.length === 0) { resolve(result); return; }

      let pending = keys.length;
      for (const key of keys) {
        const req = store.get(key);
        req.onerror = ev => reject(ev.target.error);
        req.onsuccess = ev => {
          const blob = ev.target.result;
          if (blob) result[key] = URL.createObjectURL(blob);
          pending--;
          if (pending === 0) resolve(result);
        };
      }
    };
  });
}

// ─── State ────────────────────────────────────────────────────────────────────
const today       = new Date();
let   curYear     = today.getFullYear();
let   curMonth    = today.getMonth() + 1; // 1-based
let   photoURLs   = {}; // dateKey → objectURL
let   activeDate  = null;

// ─── Calendar rendering ───────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_MONTH = ['Jan','Feb','Mar','Apr','May','Jun',
                     'Jul','Aug','Sep','Oct','Nov','Dec'];

function daysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}

function firstDayOfMonth(y, m) {
  return new Date(y, m - 1, 1).getDay(); // 0=Sun
}

function dateKey(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

async function renderCalendar() {
  // Update heading
  document.getElementById('month-heading').textContent =
    `${MONTH_NAMES[curMonth - 1]} ${curYear}`;

  // Fetch all photos for this month
  // First revoke old object URLs
  Object.values(photoURLs).forEach(u => URL.revokeObjectURL(u));
  photoURLs = await getAllPhotosForMonth(curYear, curMonth);

  const grid   = document.getElementById('calendar-grid');
  grid.innerHTML = '';

  const firstDay  = firstDayOfMonth(curYear, curMonth);
  const numDays   = daysInMonth(curYear, curMonth);
  const todayKey  = dateKey(today.getFullYear(), today.getMonth()+1, today.getDate());

  // Leading empty pads
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty-pad';
    grid.appendChild(cell);
  }

  // Day cells
  for (let d = 1; d <= numDays; d++) {
    const key   = dateKey(curYear, curMonth, d);
    const isToday  = key === todayKey;
    const isPast   = key < todayKey;
    const isFuture = key > todayKey;
    const hasPhoto = !!photoURLs[key];

    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    cell.dataset.key = key;
    cell.dataset.day = d;

    if (isFuture) {
      cell.classList.add('future');
    } else if (isToday) {
      cell.classList.add('today');
    }

    if (hasPhoto) {
      cell.classList.add('filled');
      const img = document.createElement('img');
      img.className = 'cell-photo';
      img.src = photoURLs[key];
      img.draggable = false;
      cell.appendChild(img);
    } else if (isPast) {
      const label = document.createElement('div');
      label.className = 'sky-unseen';
      label.textContent = 'sky unseen';
      cell.appendChild(label);
    }

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = String(d).padStart(2, '0');
    cell.appendChild(numEl);

    // Click handler (past + today only)
    if (!isFuture) {
      cell.addEventListener('click', () => openSheet(key, d));
    }

    grid.appendChild(cell);
  }

  // Trailing empty pads to complete the last row
  const totalCells = firstDay + numDays;
  const remainder  = totalCells % 7;
  if (remainder !== 0) {
    const trailing = 7 - remainder;
    for (let i = 0; i < trailing; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty-pad';
      grid.appendChild(cell);
    }
  }

  // Set card height: header (149) + grid rows + color strip (13)
  const rows = Math.ceil((firstDay + numDays) / 7);
  // Each row is 120px; shared borders collapse: total grid height = rows*120 - (rows-1)
  const gridHeight = rows * 120 - (rows - 1);
  document.getElementById('calendar-card').style.height = (149 + gridHeight + 13) + 'px';

  if (!isAnimating) applyScale();
}

// ─── Bottom sheet ─────────────────────────────────────────────────────────────
function openSheet(key, day) {
  activeDate = key;

  // Date label: "April 25"
  document.getElementById('sheet-date').textContent =
    `${MONTH_NAMES[curMonth - 1]} ${day}`;

  renderSheetBody(key);

  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('bottom-sheet').classList.add('open');
}

function renderSheetBody(key) {
  const body = document.getElementById('sheet-body');
  body.innerHTML = '';

  if (photoURLs[key]) {
    // Show preview + replace link
    const img = document.createElement('img');
    img.className = 'sheet-photo-preview';
    img.src = photoURLs[key];
    body.appendChild(img);

    const btn = document.createElement('button');
    btn.className = 'sheet-replace';
    btn.textContent = 'replace photo';
    btn.addEventListener('click', () => document.getElementById('file-input').click());
    body.appendChild(btn);
  } else {
    // Tap zone
    const zone = document.createElement('div');
    zone.className = 'sheet-tap-zone';
    zone.textContent = 'tap to choose a sky photo';
    zone.addEventListener('click', () => document.getElementById('file-input').click());
    body.appendChild(zone);
  }
}

function closeSheet() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('bottom-sheet').classList.remove('open');
  activeDate = null;
}

// ─── File input ───────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file || !activeDate) return;
  e.target.value = '';

  const key  = activeDate;
  const blob = file;

  await savePhoto(key, blob);

  // Revoke old URL if any
  if (photoURLs[key]) URL.revokeObjectURL(photoURLs[key]);
  photoURLs[key] = URL.createObjectURL(blob);

  // Update cell immediately
  const cell = document.querySelector(`.cal-cell[data-key="${key}"]`);
  if (cell) {
    cell.classList.add('filled');
    // Remove sky-unseen label
    const lbl = cell.querySelector('.sky-unseen');
    if (lbl) lbl.remove();
    // Remove old photo if any
    const old = cell.querySelector('.cell-photo');
    if (old) old.remove();
    // Add new photo
    const img = document.createElement('img');
    img.className = 'cell-photo';
    img.src = photoURLs[key];
    img.draggable = false;
    cell.insertBefore(img, cell.firstChild);
    // Make day number white
    const numEl = cell.querySelector('.day-num');
    if (numEl) numEl.style.color = '#fff';
  }

  // Close sheet with slight delay for visual feedback
  closeSheet();
});

// ─── Animation state & helpers ────────────────────────────────────────────────
let isAnimating = false;

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ─── Backward navigation — simple fade ───────────────────────────────────────
async function animatePrevMonth() {
  if (isAnimating) return;
  isAnimating = true;

  const card = document.getElementById('calendar-card');

  // Fade out current month
  const fadeOut = card.animate(
    [{ opacity: 1 }, { opacity: 0 }],
    { duration: 150, easing: 'ease-out', fill: 'forwards' }
  );
  await fadeOut.finished;
  fadeOut.commitStyles();
  fadeOut.cancel();

  curMonth--;
  if (curMonth < 1) { curMonth = 12; curYear--; }
  await renderCalendar();

  card.style.opacity = '0'; // hold hidden while render paints

  // Fade in new month
  const fadeIn = card.animate(
    [{ opacity: 0 }, { opacity: 1 }],
    { duration: 200, easing: 'ease-in', fill: 'forwards' }
  );
  await fadeIn.finished;
  fadeIn.commitStyles();
  fadeIn.cancel();
  card.style.opacity = '';

  isAnimating = false;
}

// ─── Forward navigation — page-tear (hinges at top, falls with gravity) ──────
async function animateNextMonth() {
  if (isAnimating) return;
  isAnimating = true;

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    curMonth++;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    await renderCalendar();
    isAnimating = false;
    return;
  }

  const card    = document.getElementById('calendar-card');
  const binding = document.getElementById('spiral-binding');

  // ── 1. Clone the current card as a visual snapshot ────────────────────────
  const rect = card.getBoundingClientRect();
  const snapshot = card.cloneNode(true);
  snapshot.style.cssText = `
    position: absolute;
    top: ${rect.top}px;
    left: ${rect.left}px;
    width: ${rect.width}px;
    height: ${rect.height}px;
    margin: 0;
    z-index: 20;
    pointer-events: none;
    transform-origin: top center;
    transform-style: preserve-3d;
    will-change: transform, opacity;
    border-radius: 8px;
    overflow: hidden;
  `;

  // ── 2. CRITICAL: perspective wrapper directly contains the snapshot ────────
  // Fixed elements ignore ancestor perspective; this wrapper IS the context
  const perspWrap = document.createElement('div');
  perspWrap.style.cssText = `
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    perspective: 900px;
    perspective-origin: top center;
    pointer-events: none;
    z-index: 20;
  `;
  document.body.appendChild(perspWrap);
  perspWrap.appendChild(snapshot);

  // ── 3. Hide real card, render new month behind ────────────────────────────
  card.style.visibility = 'hidden';
  curMonth++;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  await renderCalendar();
  card.style.visibility = '';
  card.style.opacity    = '0';

  // ── 4. Page tear — hinges at TOP, falls downward with gravity ─────────────
  const tearAnim = snapshot.animate([
    {
      offset:    0,
      transform: 'rotateX(0deg) rotate(0deg)',
      opacity:   1,
      easing:    'ease-in',
    },
    {
      offset:    0.12,
      transform: 'rotateX(6deg) rotate(0.5deg)',
      opacity:   1,
      easing:    'ease-in',
    },
    {
      offset:    0.35,
      transform: 'rotateX(35deg) rotate(2deg)',
      opacity:   1,
      easing:    'cubic-bezier(0.4, 0, 1, 1)',
    },
    {
      offset:    0.65,
      transform: 'rotateX(68deg) rotate(3deg)',
      opacity:   1,
    },
    {
      offset:    0.80,
      transform: 'rotateX(82deg) rotate(3.5deg)',
      opacity:   0.7,
    },
    {
      offset:    1,
      transform: 'rotateX(95deg) rotate(4deg)',
      opacity:   0,
    },
  ], {
    duration: 580,
    fill:     'forwards',
  });

  // ── 5. New month fades up from slightly below ─────────────────────────────
  await delay(80);
  const revealAnim = card.animate([
    { opacity: 0, transform: 'translateY(8px) scale(0.99)' },
    { opacity: 1, transform: 'translateY(0)   scale(1)'    },
  ], {
    duration: 420,
    easing:   'ease-out',
    fill:     'forwards',
  });

  // ── 6. Wait for both ──────────────────────────────────────────────────────
  await Promise.all([tearAnim.finished, revealAnim.finished]);

  // ── 7. Cleanup ────────────────────────────────────────────────────────────
  revealAnim.commitStyles();
  revealAnim.cancel();
  perspWrap.remove();
  card.style.opacity   = '';
  card.style.transform = '';
  applyScale();
  isAnimating = false;
}

// ─── Navigation button wiring ─────────────────────────────────────────────────
document.getElementById('prev-month').addEventListener('click', animatePrevMonth);
document.getElementById('next-month').addEventListener('click', animateNextMonth);

// ─── Backdrop close ───────────────────────────────────────────────────────────
document.getElementById('backdrop').addEventListener('click', closeSheet);

// ─── Fit entire calendar in one viewport (no scroll) ─────────────────────────
function applyScale() {
  const app  = document.getElementById('app');
  const card = document.getElementById('calendar-card');
  const cardH = parseInt(card.style.height) || 759;

  const appW = 736;
  const appH = cardH + 34; // 14px spiral binding above + 20px bottom breath

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const scaleX = (vw - 16) / appW;
  const scaleY = (vh - 16) / appH;
  const scale  = Math.min(scaleX, scaleY, 1);

  // zoom scales layout too (no scroll artefacts), supported in all modern browsers
  app.style.zoom = scale;
}
window.addEventListener('resize', applyScale);

// ─── Init ─────────────────────────────────────────────────────────────────────
buildSpiral();
renderCalendar();
</script>
